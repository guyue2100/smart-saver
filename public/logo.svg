<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="#F0FDF4"/>
  
  <!-- Hand -->
  <path d="M140 380 C 140 380, 160 460, 256 460 C 352 460, 372 380, 372 380 L 372 360 L 140 360 Z" fill="#FDBA74"/>
  <rect x="140" y="340" width="232" height="40" rx="20" fill="#FDBA74"/>
  
  <!-- Coins -->
  <circle cx="200" cy="330" r="30" fill="#F59E0B" stroke="#B45309" stroke-width="4"/>
  <text x="200" y="342" font-family="sans-serif" font-size="24" font-weight="bold" fill="#B45309" text-anchor="middle">$</text>
  
  <circle cx="230" cy="330" r="30" fill="#FCD34D" stroke="#B45309" stroke-width="4"/>
  <text x="230" y="342" font-family="sans-serif" font-size="24" font-weight="bold" fill="#B45309" text-anchor="middle">$</text>
  
  <circle cx="215" cy="305" r="30" fill="#F59E0B" stroke="#B45309" stroke-width="4"/>
  <text x="215" y="317" font-family="sans-serif" font-size="24" font-weight="bold" fill="#B45309" text-anchor="middle">$</text>

  <!-- Piggy Body -->
  <path d="M156 180 
           C 156 100, 356 100, 356 180 
           C 356 260, 356 280, 356 300 
           L 156 300 
           C 156 280, 156 260, 156 180 Z" fill="#34D399"/>
  
  <!-- Ears -->
  <path d="M170 130 L 160 100 L 190 120 Z" fill="#34D399" stroke="#059669" stroke-width="4" stroke-linejoin="round"/>
  <path d="M342 130 L 352 100 L 322 120 Z" fill="#34D399" stroke="#059669" stroke-width="4" stroke-linejoin="round"/>

  <!-- Eyes -->
  <circle cx="210" cy="200" r="12" fill="#064E3B"/>
  <circle cx="302" cy="200" r="12" fill="#064E3B"/>
  
  <!-- Snout -->
  <ellipse cx="256" cy="220" rx="35" ry="25" fill="#6EE7B7"/>
  <circle cx="244" cy="220" r="6" fill="#064E3B"/>
  <circle cx="268" cy="220" r="6" fill="#064E3B"/>

  <!-- Leaf -->
  <path d="M256 100 Q 256 40, 300 40 Q 300 80, 260 100" fill="#4ADE80" stroke="#166534" stroke-width="4"/>
  <path d="M256 100 Q 256 60, 220 60 Q 220 90, 250 100" fill="#4ADE80" stroke="#166534" stroke-width="4"/>
  
  <!-- Tail -->
  <path d="M356 250 Q 380 240, 380 260 Q 370 280, 360 260" fill="none" stroke="#34D399" stroke-width="6" stroke-linecap="round"/>

  <!-- Coin Slot -->
  <rect x="236" y="110" width="40" height="8" rx="4" fill="#064E3B"/>
</svg>